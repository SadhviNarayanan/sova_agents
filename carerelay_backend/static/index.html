<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CareRelay — AI Medical Council</title>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --border: #1e2d45;
    --accent: #3b82f6;
    --accent2: #10b981;
    --danger: #ef4444;
    --warn: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --card-bg: #141e2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 32px; border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  .badge { background: var(--accent); color: #fff; font-size: 0.7rem; padding: 3px 8px; border-radius: 999px; font-weight: 600; }

  .layout { display: grid; grid-template-columns: 340px 1fr 280px; gap: 0; height: calc(100vh - 57px); }

  /* Left panel — patient input */
  .left-panel { border-right: 1px solid var(--border); padding: 24px; overflow-y: auto; background: var(--surface); }
  .left-panel h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 16px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 5px; }
  .field input, .field textarea, .field select {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 8px 10px; border-radius: 6px; font-size: 0.85rem; outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 60px; }
  .run-btn {
    width: 100%; padding: 12px; background: var(--accent); color: #fff;
    border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600;
    cursor: pointer; transition: background 0.2s; margin-top: 8px;
  }
  .run-btn:hover { background: #2563eb; }
  .run-btn:disabled { background: var(--muted); cursor: not-allowed; }

  /* Center — debate feed */
  .center-panel { display: flex; flex-direction: column; overflow: hidden; }
  .debate-header {
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
  }
  .debate-header h2 { font-size: 1rem; font-weight: 600; }
  .round-badge { background: var(--border); color: var(--muted); font-size: 0.75rem; padding: 3px 10px; border-radius: 999px; }
  .debate-feed { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }

  .agent-card {
    background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px;
    padding: 16px 18px; animation: slideIn 0.4s ease forwards; opacity: 0;
    transform: translateY(12px);
  }
  @keyframes slideIn {
    to { opacity: 1; transform: translateY(0); }
  }
  .agent-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 1rem; font-weight: 700; flex-shrink: 0;
  }
  .agent-name { font-weight: 600; font-size: 0.9rem; }
  .agent-specialty { font-size: 0.75rem; color: var(--muted); }
  .agent-statement { font-size: 0.88rem; line-height: 1.6; color: #cbd5e1; }
  .round-divider {
    display: flex; align-items: center; gap: 10px; color: var(--muted); font-size: 0.75rem;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .round-divider::before, .round-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* Typing indicator */
  .typing-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; }
  .typing-dots { display: flex; gap: 5px; }
  .typing-dots span {
    width: 6px; height: 6px; border-radius: 50%; background: var(--muted);
    animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

  /* Right panel — metrics */
  .right-panel { border-left: 1px solid var(--border); padding: 24px; overflow-y: auto; background: var(--surface); }
  .right-panel h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 20px; }

  .convergence-ring { display: flex; flex-direction: column; align-items: center; margin-bottom: 24px; }
  .ring-wrap { position: relative; width: 120px; height: 120px; margin-bottom: 10px; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-label {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 1.4rem; font-weight: 700; color: var(--accent2);
  }
  .ring-title { font-size: 0.8rem; color: var(--muted); }

  .metric-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 12px; }
  .metric-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
  .metric-value { font-size: 1.1rem; font-weight: 700; }
  .metric-value.danger { color: var(--danger); }
  .metric-value.warn { color: var(--warn); }
  .metric-value.ok { color: var(--accent2); }

  .speakers-list { margin-bottom: 12px; }
  .speaker-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .speaker-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .speaker-dot.active { background: var(--accent2); }
  .speaker-name { font-size: 0.8rem; flex: 1; }
  .speaker-count { font-size: 0.75rem; color: var(--muted); }

  /* Decision panel */
  .decision-panel {
    background: linear-gradient(135deg, #0f2a1e, #0a1628); border: 1px solid var(--accent2);
    border-radius: 12px; padding: 20px; margin: 16px 24px;
    animation: slideIn 0.5s ease forwards;
  }
  .decision-panel h3 { color: var(--accent2); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .decision-text { font-size: 0.95rem; font-weight: 600; margin-bottom: 12px; line-height: 1.5; }
  .report-text { font-size: 0.83rem; color: #94a3b8; line-height: 1.6; margin-bottom: 14px; }
  .actions-list { list-style: none; }
  .actions-list li { font-size: 0.82rem; padding: 5px 0; color: #cbd5e1; }
  .actions-list li::before { content: '→ '; color: var(--accent2); }
  .urgency-pill {
    display: inline-block; padding: 3px 12px; border-radius: 999px; font-size: 0.75rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;
  }
  .urgency-critical { background: #450a0a; color: var(--danger); }
  .urgency-high { background: #422006; color: var(--warn); }
  .urgency-medium { background: #1e3a5f; color: var(--accent); }
  .urgency-low { background: #052e16; color: var(--accent2); }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--muted); gap: 12px; }
  .empty-state svg { opacity: 0.3; }
  .empty-state p { font-size: 0.9rem; }
</style>
</head>
<body>

<header>
  <h1>Care<span>Relay</span> — AI Medical Council</h1>
  <span class="badge">LIVE DEBATE</span>
</header>

<div class="layout">

  <!-- LEFT: Patient Input -->
  <div class="left-panel">
    <h2>Patient Case</h2>
    <div class="field"><label>Patient ID</label><input id="pid" value="CR-002" /></div>
    <div class="field"><label>Age</label><input id="age" type="number" value="72" /></div>
    <div class="field"><label>Gender</label>
      <select id="gender"><option>male</option><option>female</option></select>
    </div>
    <div class="field"><label>Diagnosis</label><input id="diagnosis" value="Congestive heart failure, HFrEF, Type 2 diabetes" /></div>
    <div class="field"><label>Heart Rate (bpm)</label><input id="hr" type="number" value="112" /></div>
    <div class="field"><label>SpO2 (%)</label><input id="spo2" type="number" value="91" /></div>
    <div class="field"><label>Blood Pressure</label><input id="bp" value="158/96" /></div>
    <div class="field"><label>Symptoms (comma-separated)</label>
      <textarea id="symptoms">severe leg swelling, waking up at night to breathe, gained 4 lbs in 2 days</textarea>
    </div>
    <div class="field"><label>Trigger</label>
      <select id="trigger">
        <option value="heart_failure_decompensation">Heart Failure Decompensation</option>
        <option value="post_mi_monitoring">Post-MI Monitoring</option>
        <option value="cardiac_event">Cardiac Event</option>
        <option value="general_monitoring">General Monitoring</option>
      </select>
    </div>
    <button class="run-btn" id="runBtn" onclick="runDebate()">Convene Council</button>
  </div>

  <!-- CENTER: Debate Feed -->
  <div class="center-panel">
    <div class="debate-header">
      <h2>Council Debate</h2>
      <span class="round-badge" id="roundLabel">Waiting...</span>
    </div>
    <div class="debate-feed" id="feed">
      <div class="empty-state">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0"/>
        </svg>
        <p>Fill in patient data and click Convene Council</p>
      </div>
    </div>
  </div>

  <!-- RIGHT: Metrics -->
  <div class="right-panel">
    <h2>Live Metrics</h2>

    <div class="convergence-ring">
      <div class="ring-wrap">
        <svg width="120" height="120" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="50" fill="none" stroke="#1e2d45" stroke-width="10"/>
          <circle id="ringCircle" cx="60" cy="60" r="50" fill="none" stroke="#10b981" stroke-width="10"
            stroke-dasharray="314" stroke-dashoffset="314" stroke-linecap="round"
            style="transition: stroke-dashoffset 0.6s ease"/>
        </svg>
        <div class="ring-label" id="convergenceLabel">0%</div>
      </div>
      <div class="ring-title">Consensus Score</div>
    </div>

    <div class="metric-card">
      <div class="metric-label">Agents Spoken</div>
      <div class="metric-value" id="agentCount">0 / 7</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Current Round</div>
      <div class="metric-value" id="roundNum">—</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Urgency</div>
      <div class="metric-value" id="urgencyVal">—</div>
    </div>

    <div style="margin-top:20px">
      <div class="metric-label" style="margin-bottom:10px">Speaking Order</div>
      <div class="speakers-list" id="speakersList"></div>
    </div>
  </div>

</div>

<script>
const AGENT_COLORS = {
  "Cardiologist":            { bg: "#1e3a5f", color: "#60a5fa", emoji: "❤️" },
  "Critical Care Specialist":{ bg: "#2d1b4e", color: "#a78bfa", emoji: "🏥" },
  "Clinical Pharmacist":     { bg: "#1a3a2a", color: "#34d399", emoji: "💊" },
  "Cardiothoracic Surgeon":  { bg: "#3b1a1a", color: "#f87171", emoji: "🔬" },
  "General Physician":       { bg: "#2a2a1a", color: "#fbbf24", emoji: "🩺" },
  "Clinical Nutritionist":   { bg: "#1a2a3a", color: "#38bdf8", emoji: "🥗" },
  "OB/GYN Specialist":       { bg: "#2a1a3a", color: "#e879f9", emoji: "⚕️" },
};

let spokenAgents = new Set();
let speakersOrder = [];

function runDebate() {
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = 'Council in session...';

  // Reset UI
  document.getElementById('feed').innerHTML = '';
  document.getElementById('roundLabel').textContent = 'Round 1';
  document.getElementById('agentCount').textContent = '0 / 7';
  document.getElementById('roundNum').textContent = '1';
  document.getElementById('urgencyVal').textContent = '—';
  document.getElementById('urgencyVal').className = 'metric-value';
  document.getElementById('speakersList').innerHTML = '';
  document.getElementById('convergenceLabel').textContent = '0%';
  document.getElementById('ringCircle').style.strokeDashoffset = 314;
  spokenAgents = new Set();
  speakersOrder = [];

  const payload = {
    patient_id: document.getElementById('pid').value,
    age: parseInt(document.getElementById('age').value),
    gender: document.getElementById('gender').value,
    diagnosis: document.getElementById('diagnosis').value,
    heart_rate: parseFloat(document.getElementById('hr').value),
    spo2: parseFloat(document.getElementById('spo2').value),
    blood_pressure: document.getElementById('bp').value,
    symptoms: document.getElementById('symptoms').value.split(',').map(s => s.trim()),
    medications: [],
    trigger: document.getElementById('trigger').value,
  };

  fetch('/stream-analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).then(res => {
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    function read() {
      reader.read().then(({ done, value }) => {
        if (done) { finishSession(btn); return; }
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        lines.forEach(line => {
          if (line.startsWith('data: ')) {
            try {
              const data = JSON.parse(line.slice(6));
              handleEvent(data);
            } catch(e) {}
          }
        });
        read();
      });
    }
    read();
  }).catch(() => finishSession(btn));
}

let lastRound = 0;

function handleEvent(data) {
  if (data.type === 'agent') {
    const feed = document.getElementById('feed');

    // Remove typing indicator
    const typing = document.getElementById('typingCard');
    if (typing) typing.remove();

    // Round divider
    if (data.round !== lastRound) {
      lastRound = data.round;
      const div = document.createElement('div');
      div.className = 'round-divider';
      div.textContent = `Round ${data.round}`;
      feed.appendChild(div);
      document.getElementById('roundLabel').textContent = `Round ${data.round}`;
      document.getElementById('roundNum').textContent = data.round;
    }

    // Agent card
    const colors = AGENT_COLORS[data.agent] || { bg: '#1e2d45', color: '#64748b', emoji: '👨‍⚕️' };
    const card = document.createElement('div');
    card.className = 'agent-card';
    card.innerHTML = `
      <div class="agent-header">
        <div class="avatar" style="background:${colors.bg};color:${colors.color}">${colors.emoji}</div>
        <div>
          <div class="agent-name">${data.agent}</div>
          <div class="agent-specialty">${data.specialty}</div>
        </div>
      </div>
      <div class="agent-statement">${data.statement}</div>
    `;
    feed.appendChild(card);
    feed.scrollTop = feed.scrollHeight;

    // Update metrics
    spokenAgents.add(data.agent);
    document.getElementById('agentCount').textContent = `${spokenAgents.size} / 7`;
    updateConvergence(data.convergence || 0);
    updateSpeakersList(data.agent, data.specialty);

    // Add typing indicator for next agent
    const typingCard = document.createElement('div');
    typingCard.id = 'typingCard';
    typingCard.className = 'typing-card';
    typingCard.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    feed.appendChild(typingCard);
    feed.scrollTop = feed.scrollHeight;
  }

  if (data.type === 'decision') {
    const feed = document.getElementById('feed');
    const typing = document.getElementById('typingCard');
    if (typing) typing.remove();

    const urgencyClass = `urgency-${data.urgency_level}`;
    const panel = document.createElement('div');
    panel.className = 'decision-panel';
    const actionColor = data.immediate_action === 'Call 911' ? '#ef4444' :
      data.immediate_action === 'Call caregiver' ? '#f59e0b' :
      data.immediate_action === 'Text caregiver' ? '#3b82f6' :
      data.immediate_action === 'Initiate conversation with patient' ? '#a78bfa' : '#10b981';

    panel.innerHTML = `
      <h3>Council Decision</h3>
      <div style="background:#0a0e1a;border:2px solid ${actionColor};border-radius:10px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:12px">
        <div style="font-size:1.5rem">${
          data.immediate_action === 'Call 911' ? '🚨' :
          data.immediate_action === 'Call caregiver' ? '📞' :
          data.immediate_action === 'Text caregiver' ? '💬' :
          data.immediate_action === 'Initiate conversation with patient' ? '🗣️' : '😴'
        }</div>
        <div>
          <div style="font-size:0.7rem;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">Immediate Action</div>
          <div style="font-size:1.1rem;font-weight:800;color:${actionColor}">${data.immediate_action}</div>
        </div>
      </div>
      <span class="urgency-pill ${urgencyClass}">${data.urgency_level} urgency</span>
      <div class="decision-text">${data.decision}</div>
      <div class="report-text">${data.doctor_report}</div>
      ${data.actions?.length ? `
        <ul class="actions-list">
          ${data.actions.map(a => `<li>${a}</li>`).join('')}
        </ul>` : ''}
    `;
    feed.appendChild(panel);
    feed.scrollTop = feed.scrollHeight;

    const urgEl = document.getElementById('urgencyVal');
    urgEl.textContent = data.urgency_level.toUpperCase();
    urgEl.className = 'metric-value ' + (
      data.urgency_level === 'critical' ? 'danger' :
      data.urgency_level === 'high' ? 'warn' : 'ok'
    );
    updateConvergence(data.confidence || 0.8);
  }

  if (data.type === 'done') {
    const btn = document.getElementById('runBtn');
    finishSession(btn);
  }
}

function updateConvergence(score) {
  const pct = Math.round(score * 100);
  document.getElementById('convergenceLabel').textContent = pct + '%';
  const offset = 314 - (314 * score);
  document.getElementById('ringCircle').style.strokeDashoffset = offset;
}

function updateSpeakersList(agentName, specialty) {
  const list = document.getElementById('speakersList');
  const existing = list.querySelector(`[data-agent="${agentName}"]`);
  if (existing) {
    const countEl = existing.querySelector('.speaker-count');
    countEl.textContent = parseInt(countEl.textContent) + 1 + 'x';
    existing.querySelector('.speaker-dot').classList.add('active');
  } else {
    const row = document.createElement('div');
    row.className = 'speaker-row';
    row.dataset.agent = agentName;
    row.innerHTML = `
      <div class="speaker-dot active"></div>
      <div class="speaker-name">${agentName.replace('Dr. ', '')}</div>
      <div class="speaker-count">1x</div>
    `;
    list.appendChild(row);
  }
}

function finishSession(btn) {
  btn.disabled = false;
  btn.textContent = 'Convene Council';
  const typing = document.getElementById('typingCard');
  if (typing) typing.remove();
}
</script>

</body>
</html>
