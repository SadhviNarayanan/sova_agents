services:
  - type: web
    name: carerelay
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install -r carerelay_backend/requirements.txt
    startCommand: uvicorn carerelay_backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false
