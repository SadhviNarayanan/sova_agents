services:
  - type: web
    name: carerelay
    runtime: python
    pythonVersion: "3.11"
    buildCommand: pip install -r carerelay_backend/requirements.txt
    startCommand: uvicorn carerelay_backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_AGENT_ID
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_API_KEY_SID
        sync: false
      - key: TWILIO_API_KEY_SECRET
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: SOVA_CAREGIVER_PHONE
        sync: false
      - key: SOVA_CAREGIVER_NAME
        sync: false
      - key: SOVA_PATIENT_NAME
        sync: false
      - key: SOVA_PATIENT_ADDRESS
        sync: false
      - key: SOVA_PATIENT_CONDITIONS
        sync: false
      - key: SOVA_TTS_PROVIDER
        value: openai
      - key: SOVA_STT_PROVIDER
        value: openai
      - key: SOVA_USE_BIGQUERY_VITALS
        value: "false"
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false
